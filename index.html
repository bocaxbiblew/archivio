<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - Archivio Stream</title>
  <link rel="stylesheet" href="style.css?v=7">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Archivio">
  <link rel="apple-touch-icon" href="assets/logo.png">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-left">
      <img src="assets/logo.png" alt="Logo" class="logo" style="height: 35px; cursor:pointer;" onclick="window.location.href='index.html'">
    </div>
    <div class="nav-right">
      <button class="icon-btn" id="open-search"><i class='bx bx-search'></i></button>
      <button class="icon-btn"><i class='bx bx-bookmark'></i></button>
      <img src="https://placehold.co/100x100/ffcc00/000?text=User" alt="Profile" class="profile-avatar">
    </div>
  </nav>

  <!-- Mobile Tab Bar (iOS style) -->
  <div class="mobile-tab-bar">
    <a href="index.html" class="active"><img src="assets/icons/icons8-home-100.png" width="24" height="24"><span>Home</span></a>
    <a href="catalog_series.html"><img src="assets/icons/icons8-tv-100.png" width="24" height="24" style="opacity: 0.6;"><span>Serie</span></a>
    <a href="catalog_movies.html"><img src="assets/icons/icons8-movie-100.png" width="24" height="24" style="opacity: 0.6;"><span>Film</span></a>
    <a href="calendar.html"><img src="assets/icons/icons8-calendar-100.png" width="24" height="24" style="opacity: 0.6;"><span>Uscite</span></a>
  </div>

  <!-- Search Overlay -->
  <div class="search-overlay" id="search-overlay">
    <div class="search-container">
      <button class="close-search" id="close-search"><i class='bx bx-x'></i></button>
      <input type="text" id="search-input" placeholder="Cerca film, serie..." autocomplete="off">
      <div class="search-results" id="search-results"></div>
    </div>
  </div>

  <!-- Hero Section Slider -->
  <div class="hero-slider-container">
    <div class="hero-slider" id="hero-slider">
      <!-- Slides Injected via JS -->
    </div>
    <div class="slider-indicators" id="slider-indicators"></div>
  </div>



  <!-- In evidenza -->
  <section class="section">
    <h2 class="section-title">In evidenza</h2>
    <div class="carousel-container" id="evidenza-carousel">
      <!-- Injected via JS -->
    </div>
  </section>

  <!-- TOP 10 SERIE OGGI -->
  <section class="section">
    <img src="top 10 serie.webp" alt="TOP 10 SERIE OGGI" class="section-logo-title">
    <div class="carousel-container" id="top10-series-carousel">
      <!-- Injected via JS -->
    </div>
  </section>

  <!-- Tutte le serie -->
  <section class="section">
    <h2 class="section-title">Tutte le serie</h2>
    <div class="carousel-container" id="all-series-carousel">
      <!-- Injected via JS -->
    </div>
  </section>

  <!-- TOP 10 FILM OGGI -->
  <section class="section">
    <img src="top 10 film.webp" alt="TOP 10 FILM OGGI" class="section-logo-title">
    <div class="carousel-container" id="top10-movies-carousel">
      <!-- Injected via JS -->
    </div>
  </section>

  <!-- Tutti i film -->
  <section class="section" style="margin-bottom: 5rem;">
    <h2 class="section-title">Tutti i film</h2>
    <div class="carousel-container" id="all-movies-carousel">
      <!-- Injected via JS -->
    </div>
  </section>

  <script src="script.js?v=7"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js');
      });
    }
  </script>
</body>
</html>
