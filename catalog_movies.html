<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalogo Film - Archivio Stream</title>
  <link rel="stylesheet" href="style.css?v=7">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Archivio">
  <link rel="apple-touch-icon" href="assets/logo.png">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-left">
      <img src="assets/logo.png" alt="Logo" class="logo" style="height: 45px; cursor:pointer;" onclick="window.location.href='index.html'">
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="catalog_series.html">Serie</a></li>
      <li><a href="catalog_movies.html" class="active">Film</a></li>
      <li><a href="calendar.html">Uscite</a></li>
    </ul>
    <div class="nav-right">
      <button class="icon-btn"><i class='bx bx-search'></i></button>
      <button class="icon-btn"><i class='bx bx-bookmark'></i></button>
      <img src="https://placehold.co/100x100/ffcc00/000?text=User" alt="Profile" class="profile-avatar">
    </div>
  </nav>

  <!-- Mobile Tab Bar (iOS style) -->
  <div class="mobile-tab-bar">
    <a href="index.html"><img src="assets/icons/icons8-home-100.png" width="28" height="28" style="opacity: 0.6;"><span>Home</span></a>
    <a href="catalog_series.html"><img src="assets/icons/icons8-tv-100.png" width="28" height="28" style="opacity: 0.6;"><span>Serie</span></a>
    <a href="catalog_movies.html" class="active"><img src="assets/icons/icons8-movie-100.png" width="28" height="28"><span>Film</span></a>
    <a href="calendar.html"><img src="assets/icons/icons8-calendar-100.png" width="28" height="28" style="opacity: 0.6;"><span>Uscite</span></a>
  </div>

  <header class="catalog-header" style="flex-direction: column; align-items: flex-start;">
    <div style="display: flex; justify-content: space-between; width: 100%; align-items: flex-start;">
      <div>
        <h1 class="catalog-title" style="margin-bottom: 5px;">All Movies</h1>
        <p style="color: #aaa; font-size: 0.9rem; margin-top: 5px;">A broad wall of movies worth browsing.</p>
      </div>
      <i class='bx bx-grid-alt' style="font-size: 1.5rem; color: #fff;"></i>
    </div>
    <div style="margin: 20px 0; display: flex; justify-content: center; width: 100%;">
      <button style="background: rgba(255,255,255,0.1); border: none; color: white; padding: 10px 20px; border-radius: 20px; display: flex; align-items: center; gap: 10px; font-weight: 600; cursor: pointer;">
        All Movies <i class='bx bx-chevron-down'></i>
      </button>
    </div>
  </header>

  <main class="catalog-grid" id="catalog-grid-movies">
    <!-- Locandine inserite via JS -->
  </main>

  <script src="script.js?v=7"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js');
      });
    }
  </script>
</body>
</html>
