<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalogo Serie - Archivio Stream</title>
  <link rel="stylesheet" href="style.css?v=7">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Archivio">
  <link rel="apple-touch-icon" href="assets/logo.png">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-left">
      <img src="assets/logo.png" alt="Logo" class="logo" style="height: 35px; cursor:pointer;" onclick="window.location.href='index.html'">
    </div>
    <div class="nav-right">
      <button class="icon-btn"><i class='bx bx-search'></i></button>
      <button class="icon-btn"><i class='bx bx-bookmark'></i></button>
      <img src="https://placehold.co/100x100/ffcc00/000?text=User" alt="Profile" class="profile-avatar">
    </div>
  </nav>

  <!-- Mobile Tab Bar (iOS style) -->
  <div class="mobile-tab-bar">
    <a href="index.html"><img src="assets/icons/icons8-home-100.png" width="24" height="24" style="opacity: 0.6;"><span>Home</span></a>
    <a href="catalog_series.html" class="active"><img src="assets/icons/icons8-tv-100.png" width="24" height="24"><span>Serie</span></a>
    <a href="catalog_movies.html"><img src="assets/icons/icons8-movie-100.png" width="24" height="24" style="opacity: 0.6;"><span>Film</span></a>
    <a href="calendar.html"><img src="assets/icons/icons8-calendar-100.png" width="24" height="24" style="opacity: 0.6;"><span>Uscite</span></a>
  </div>

  <header class="catalog-header">
    <h1 class="catalog-title">Serie TV</h1>
  </header>

  <main class="catalog-grid" id="catalog-grid-series">
    <!-- Locandine inserite via JS -->
  </main>

  <script src="script.js?v=7"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js');
      });
    }
  </script>
</body>
</html>
