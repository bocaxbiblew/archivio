<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Private Streaming</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #000;
      color: #fff;
    }
    .login-container {
      background: rgba(20, 20, 20, 0.9);
      padding: 3rem;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      max-width: 400px;
      width: 100%;
    }
    .login-container h1 {
      margin-bottom: 2rem;
      font-weight: 600;
    }
    .login-input {
      width: 100%;
      padding: 1rem;
      font-size: 1.2rem;
      background: #333;
      border: 1px solid #555;
      color: #fff;
      border-radius: 6px;
      margin-bottom: 1.5rem;
      text-align: center;
      letter-spacing: 4px;
    }
    .login-btn {
      width: 100%;
      padding: 1rem;
      font-size: 1.1rem;
      background: var(--primary-color, #7026e6);
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.3s;
    }
    .login-btn:hover {
      background: #5a1bb9;
    }
    .error-msg {
      color: #ff4d4d;
      margin-bottom: 1rem;
      display: none;
    }
    .telegram-link {
      display: block;
      margin-top: 1.5rem;
      color: #ccc;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .telegram-link:hover {
      color: #fff;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Accesso Privato</h1>
    <p class="error-msg" id="error-msg">Codice errato o scaduto.</p>
    <input type="text" id="otp-input" class="login-input" placeholder="Codice a 6 cifre" maxlength="6">
    <button class="login-btn" id="login-btn">Entra</button>
    
    <!-- Sostituisci questo link col link del tuo bot! -->
    <a href="https://t.me/@superbase_db_bot" target="_blank" class="telegram-link">Richiedi codice tramite Telegram</a>
  </div>
  
  <script>
    // Configurabile per il backend
    const API_URL = 'https://api-archivio.duckdns.org/api';

    document.getElementById('login-btn').addEventListener('click', async () => {
      const code = document.getElementById('otp-input').value;
      const errorMsg = document.getElementById('error-msg');
      
      if(code.length !== 6) {
        errorMsg.textContent = "Il codice deve essere di 6 cifre.";
        errorMsg.style.display = 'block';
        return;
      }
      
      try {
        const res = await fetch(`${API_URL}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code })
        });
        
        const data = await res.json();
        
        if(res.ok && data.success) {
          // Salvo i dati utente in locale per accedere al sito
          localStorage.setItem('user_auth', JSON.stringify(data.user));
          window.location.href = 'index.html';
        } else {
          errorMsg.textContent = data.error || 'Errore di accesso.';
          errorMsg.style.display = 'block';
        }
      } catch(e) {
        errorMsg.textContent = "Errore di connessione al server.";
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
