<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Private Streaming</title>
  <link rel="stylesheet" href="style.css?v=7">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #7026e6;
      --primary-hover: #5a1bb9;
      --font-main: 'Inter', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-main);
      color: #fff;
      overflow: hidden; /* Nasconde le barre di scorrimento create dall'animazione */
      background: #0f0c29;
      background: linear-gradient(to right, #0f0c29, #302b63, #24243e);
    }

    /* --- Sfondo Animato --- */
    .area {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      z-index: 0;
    }

    .circles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      margin: 0;
      padding: 0;
    }

    .circles li {
      position: absolute;
      display: block;
      list-style: none;
      width: 20px;
      height: 20px;
      background: rgba(255, 255, 255, 0.1);
      animation: animate 25s linear infinite;
      bottom: -150px;
      border-radius: 10px; /* Forme leggermente arrotondate */
    }

    .circles li:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
    .circles li:nth-child(2) { left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; }
    .circles li:nth-child(3) { left: 70%; width: 20px; height: 20px; animation-delay: 4s; }
    .circles li:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; }
    .circles li:nth-child(5) { left: 65%; width: 20px; height: 20px; animation-delay: 0s; }
    .circles li:nth-child(6) { left: 75%; width: 110px; height: 110px; animation-delay: 3s; background: rgba(112, 38, 230, 0.2); }
    .circles li:nth-child(7) { left: 35%; width: 150px; height: 150px; animation-delay: 7s; }
    .circles li:nth-child(8) { left: 50%; width: 25px; height: 25px; animation-delay: 15s; animation-duration: 45s; }
    .circles li:nth-child(9) { left: 20%; width: 15px; height: 15px; animation-delay: 2s; animation-duration: 35s; }
    .circles li:nth-child(10) { left: 85%; width: 150px; height: 150px; animation-delay: 0s; animation-duration: 11s; background: rgba(112, 38, 230, 0.1); }

    @keyframes animate {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 1;
        border-radius: 20%;
      }
      100% {
        transform: translateY(-1000px) rotate(720deg);
        opacity: 0;
        border-radius: 50%;
      }
    }

    /* --- Contenitore Principale --- */
    .wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      position: relative;
      z-index: 1; /* Mantiene il form sopra l'animazione */
      padding: 20px;
    }

    /* --- Glassmorphism Card --- */
    .login-container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      padding: 3rem 2.5rem;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-top: 1px solid rgba(255, 255, 255, 0.3);
      border-left: 1px solid rgba(255, 255, 255, 0.3);
      max-width: 420px;
      width: 100%;
    }

    .login-container h1.logo-title {
      font-weight: 900;
      font-size: 2.8rem;
      letter-spacing: 3px;
      margin-bottom: 0.2rem;
      text-transform: uppercase;
      background: linear-gradient(135deg, #fff, #b3b3b3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0px 4px 15px rgba(0,0,0,0.2);
    }

    .login-container h2 {
      font-weight: 400;
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 2rem;
    }

    .login-input {
      width: 100%;
      padding: 1.2rem;
      font-size: 1.5rem;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      border-radius: 12px;
      margin-bottom: 1.5rem;
      text-align: center;
      letter-spacing: 8px;
      transition: all 0.3s ease;
      outline: none;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
    }

    .login-input::placeholder {
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 4px;
    }

    .login-input:focus {
      background: rgba(0, 0, 0, 0.6);
      border-color: var(--primary-color);
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.5), 0 0 15px rgba(112, 38, 230, 0.4);
    }

    .login-btn {
      width: 100%;
      padding: 1.1rem;
      font-size: 1.2rem;
      background: var(--primary-color);
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      box-shadow: 0 5px 15px rgba(112, 38, 230, 0.4);
    }

    .login-btn:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(112, 38, 230, 0.6);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .error-msg {
      background: rgba(255, 77, 77, 0.15);
      color: #ff6b6b;
      border: 1px solid rgba(255, 77, 77, 0.3);
      padding: 0.8rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
      font-weight: 500;
      display: none;
    }

    .telegram-link {
      display: inline-block;
      margin-top: 2rem;
      color: rgba(255, 255, 255, 0.5);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s;
    }

    .telegram-link:hover {
      color: #fff;
      text-decoration: underline;
    }

  </style>

  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Archivio">
  <link rel="apple-touch-icon" href="assets/logo.png">
</head>
<body>

  <div class="area">
    <ul class="circles">
      <li></li><li></li><li></li><li></li><li></li>
      <li></li><li></li><li></li><li></li><li></li>
    </ul>
  </div>

  <div class="wrapper">
    <div class="login-container">
      <h1 class="logo-title">ARCHIVIO</h1>
      <h2>Accesso Privato</h2>
      
      <div class="error-msg" id="error-msg">Codice errato o scaduto.</div>
      
      <input type="text" id="otp-input" class="login-input" placeholder="000000" maxlength="6" autocomplete="off">
      <button class="login-btn" id="login-btn">Entra</button>
      
      <a href="https://t.me/TUO_BOT_TELEGRAM" target="_blank" class="telegram-link">Richiedi codice tramite Telegram</a>
    </div>
  </div>
  
  <script>
    // Configurabile per il backend
    const API_URL = 'https://api-archivio.duckdns.org/api';

    document.getElementById('login-btn').addEventListener('click', async () => {
      const code = document.getElementById('otp-input').value;
      const errorMsg = document.getElementById('error-msg');
      
      if(code.length !== 6) {
        errorMsg.textContent = "Il codice deve essere di 6 cifre.";
        errorMsg.style.display = 'block';
        return;
      }
      
      try {
        const res = await fetch(`${API_URL}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code })
        });
        
        const data = await res.json();
        
        if(res.ok && data.success) {
          // Salvo i dati utente in locale per accedere al sito
          localStorage.setItem('user_auth', JSON.stringify(data.user));
          window.location.href = 'index.html';
        } else {
          errorMsg.textContent = data.error || 'Errore di accesso.';
          errorMsg.style.display = 'block';
        }
      } catch(e) {
        errorMsg.textContent = "Errore di connessione al server.";
        errorMsg.style.display = 'block';
      }
    });
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js');
      });
    }
  </script>
</body>
</html>
