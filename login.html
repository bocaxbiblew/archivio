<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Private Streaming</title>
  <link rel="stylesheet" href="style.css?v=7">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #7026e6;
      --font-logo: 'Inter', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #0f0c29;
      background: linear-gradient(135deg, #0f0c29, #302b63, #0f0c29);
      font-family: 'Inter', sans-serif;
      color: #fff;
      overflow: hidden;
      position: relative;
    }

    /* Elementi colorati di sfondo per far risaltare l'effetto vetro */
    .blob-1 {
      position: absolute;
      width: 300px;
      height: 300px;
      background: #7026e6;
      border-radius: 50%;
      top: 10%;
      left: 15%;
      filter: blur(100px);
      z-index: 0;
      opacity: 0.6;
    }

    .blob-2 {
      position: absolute;
      width: 250px;
      height: 250px;
      background: #ff4d4d;
      border-radius: 50%;
      bottom: 15%;
      right: 15%;
      filter: blur(100px);
      z-index: 0;
      opacity: 0.4;
    }

    /* Contenitore Glassmorphism */
    .login-container {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.05); /* Sfondo semitrasparente */
      backdrop-filter: blur(16px); /* Sfocatura stile vetro */
      -webkit-backdrop-filter: blur(16px);
      padding: 3.5rem 3rem;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      border-left: 1px solid rgba(255, 255, 255, 0.2);
      max-width: 420px;
      width: 90%;
    }

    .logo-title {
      color: white;
      font-weight: 900;
      font-family: var(--font-logo);
      font-size: 2.5rem;
      letter-spacing: 4px;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
    }

    .subtitle {
      font-weight: 400;
      font-size: 1.1rem;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 2.5rem;
    }

    .login-input {
      width: 100%;
      padding: 1.2rem;
      font-size: 1.2rem;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      border-radius: 10px;
      margin-bottom: 1.5rem;
      text-align: center;
      letter-spacing: 6px;
      transition: all 0.3s ease;
      outline: none;
    }

    .login-input::placeholder {
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 2px;
    }

    .login-input:focus {
      background: rgba(0, 0, 0, 0.5);
      border-color: var(--primary-color);
      box-shadow: 0 0 15px rgba(112, 38, 230, 0.3);
    }

    .login-btn {
      width: 100%;
      padding: 1.2rem;
      font-size: 1.1rem;
      background: var(--primary-color);
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(112, 38, 230, 0.4);
    }

    .login-btn:hover {
      background: #5a1bb9;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(112, 38, 230, 0.6);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .error-msg {
      background: rgba(255, 77, 77, 0.1);
      color: #ff4d4d;
      border: 1px solid rgba(255, 77, 77, 0.3);
      padding: 0.8rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
      display: none;
    }

    .telegram-link {
      display: inline-block;
      margin-top: 2rem;
      color: rgba(255, 255, 255, 0.5);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.3s;
    }

    .telegram-link:hover {
      color: #fff;
      text-decoration: underline;
    }
  </style>

  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Archivio">
  <link rel="apple-touch-icon" href="assets/logo.png">
</head>
<body>
  
  <div class="blob-1"></div>
  <div class="blob-2"></div>

  <div class="login-container">
    <h1 class="logo-title">ARCHIVIO</h1>
    <h2 class="subtitle">Accesso Privato</h2>
    
    <div class="error-msg" id="error-msg">Codice errato o scaduto.</div>
    
    <input type="text" id="otp-input" class="login-input" placeholder="000000" maxlength="6" autocomplete="off">
    <button class="login-btn" id="login-btn">ENTRA</button>
    
    <a href="https://t.me/TUO_BOT_TELEGRAM" target="_blank" class="telegram-link">Richiedi codice tramite Telegram</a>
  </div>
  
  <script>
    // Configurabile per il backend
    const API_URL = 'https://api-archivio.duckdns.org/api';

    document.getElementById('login-btn').addEventListener('click', async () => {
      const code = document.getElementById('otp-input').value;
      const errorMsg = document.getElementById('error-msg');
      
      if(code.length !== 6) {
        errorMsg.textContent = "Il codice deve essere di 6 cifre.";
        errorMsg.style.display = 'block';
        return;
      }
      
      try {
        const res = await fetch(`${API_URL}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code })
        });
        
        const data = await res.json();
        
        if(res.ok && data.success) {
          // Salvo i dati utente in locale per accedere al sito
          localStorage.setItem('user_auth', JSON.stringify(data.user));
          window.location.href = 'index.html';
        } else {
          errorMsg.textContent = data.error || 'Errore di accesso.';
          errorMsg.style.display = 'block';
        }
      } catch(e) {
        errorMsg.textContent = "Errore di connessione al server.";
        errorMsg.style.display = 'block';
      }
    });
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js');
      });
    }
  </script>
</body>
</html>
