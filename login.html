<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Private Streaming</title>
  <link rel="stylesheet" href="style.css?v=7">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #8b5cf6;
      --primary-hover: #7c3aed;
      --font-main: 'Inter', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-main);
      color: #fff;
      overflow: hidden;
      background: #09090b; /* Sfondo ultra scuro moderno */
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* --- Sfondo Animato Aesthetic (Orbs & Blobs) --- */
    .background-animation {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      overflow: hidden;
      z-index: 0;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.55;
      animation: floatOrb ease-in-out infinite alternate;
    }

    .orb-1 {
      width: 380px;
      height: 380px;
      background: radial-gradient(circle, #8b5cf6 0%, #4c1d95 100%);
      top: -10%;
      left: 10%;
      animation-duration: 14s;
    }

    .orb-2 {
      width: 420px;
      height: 420px;
      background: radial-gradient(circle, #ec4899 0%, #8b5cf6 100%);
      bottom: -10%;
      right: 10%;
      animation-duration: 18s;
      animation-delay: -4s;
    }

    .orb-3 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, #06b6d4 0%, #3b82f6 100%);
      top: 40%;
      left: 60%;
      animation-duration: 20s;
      animation-delay: -8s;
    }

    .orb-4 {
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, #f43f5e 0%, #a855f7 100%);
      bottom: 20%;
      left: 15%;
      animation-duration: 16s;
      animation-delay: -2s;
    }

    @keyframes floatOrb {
      0% {
        transform: translate(0, 0) scale(1) rotate(0deg);
      }
      33% {
        transform: translate(60px, -80px) scale(1.15) rotate(120deg);
      }
      66% {
        transform: translate(-50px, 50px) scale(0.85) rotate(240deg);
      }
      100% {
        transform: translate(30px, -30px) scale(1.05) rotate(360deg);
      }
    }

    /* --- Glassmorphism Card --- */
    .login-container {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      padding: 3.5rem 2.8rem;
      border-radius: 24px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6),
                  inset 0 1px 1px rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.08);
      max-width: 400px;
      width: 90%;
      animation: containerFade 1.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes containerFade {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .logo-title {
      font-weight: 900;
      font-size: 2.6rem;
      letter-spacing: 6px;
      margin-bottom: 0.2rem;
      text-transform: uppercase;
      background: linear-gradient(180deg, #ffffff 0%, rgba(255, 255, 255, 0.6) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-weight: 400;
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 2.2rem;
      letter-spacing: 1px;
    }

    .login-input {
      width: 100%;
      padding: 1.1rem;
      font-size: 1.4rem;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      border-radius: 14px;
      margin-bottom: 1.2rem;
      text-align: center;
      letter-spacing: 8px;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      outline: none;
    }

    .login-input::placeholder {
      color: rgba(255, 255, 255, 0.2);
      letter-spacing: 3px;
      font-size: 1rem;
    }

    .login-input:focus {
      background: rgba(0, 0, 0, 0.5);
      border-color: rgba(139, 92, 246, 0.6);
      box-shadow: 0 0 20px rgba(139, 92, 246, 0.25);
    }

    .login-btn {
      width: 100%;
      padding: 1.1rem;
      font-size: 1rem;
      background: var(--primary-color);
      color: #fff;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(139, 92, 246, 0.35);
    }

    .login-btn:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(139, 92, 246, 0.5);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .error-msg {
      background: rgba(244, 63, 94, 0.12);
      color: #fb7185;
      border: 1px solid rgba(244, 63, 94, 0.25);
      padding: 0.75rem;
      border-radius: 10px;
      margin-bottom: 1.2rem;
      font-size: 0.85rem;
      display: none;
    }

    .telegram-link {
      display: inline-block;
      margin-top: 1.8rem;
      color: rgba(255, 255, 255, 0.4);
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.3s;
    }

    .telegram-link:hover {
      color: rgba(255, 255, 255, 0.8);
      text-decoration: underline;
    }
  </style>

  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Archivio">
  <link rel="apple-touch-icon" href="assets/logo.png">
</head>
<body>

  <div class="background-animation">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="orb orb-4"></div>
  </div>

  <div class="login-container">
    <h1 class="logo-title">ARCHIVIO</h1>
    <p class="subtitle">Accesso Privato</p>
    
    <div class="error-msg" id="error-msg">Codice errato o scaduto.</div>
    
    <input type="text" id="otp-input" class="login-input" placeholder="000000" maxlength="6" autocomplete="off">
    <button class="login-btn" id="login-btn">Entra</button>
    
    <a href="https://t.me/superbase_db_bot" target="_blank" class="telegram-link">Richiedi codice tramite Telegram</a>
  </div>
  
  <script>
    const API_URL = 'https://api-archivio.duckdns.org/api';

    document.getElementById('login-btn').addEventListener('click', async () => {
      const code = document.getElementById('otp-input').value;
      const errorMsg = document.getElementById('error-msg');
      
      if(code.length !== 6) {
        errorMsg.textContent = "Il codice deve essere di 6 cifre.";
        errorMsg.style.display = 'block';
        return;
      }
      
      try {
        const res = await fetch(`${API_URL}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code })
        });
        
        const data = await res.json();
        
        if(res.ok && data.success) {
          localStorage.setItem('user_auth', JSON.stringify(data.user));
          window.location.href = 'index.html';
        } else {
          errorMsg.textContent = data.error || 'Errore di accesso.';
          errorMsg.style.display = 'block';
        }
      } catch(e) {
        errorMsg.textContent = "Errore di connessione al server.";
        errorMsg.style.display = 'block';
      }
    });
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js');
      });
    }
  </script>
</body>
</html>
