<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendario Uscite - Antigravity</title>
  <link rel="stylesheet" href="style.css">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <style>
    .calendar-container {
      padding: 120px 5% 50px 5%;
      min-height: 80vh;
    }
    .calendar-title {
      font-size: 2.5rem;
      margin-bottom: 2rem;
      font-weight: 800;
      text-align: center;
    }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
    }
    .calendar-card {
      background: #111;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      text-decoration: none;
      color: white;
      border: 1px solid rgba(255,255,255,0.05);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }
    .calendar-card:hover {
      transform: translateY(-8px) scale(1.02);
      border-color: rgba(255,255,255,0.15);
      box-shadow: 0 15px 30px rgba(0,0,0,0.5);
    }
    .cal-img-wrapper {
      position: relative;
      aspect-ratio: 2/3;
      width: 100%;
    }
    .cal-img-wrapper::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 50%;
      background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    }
    .cal-img-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .cal-date-badge {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: #f5c518;
      color: #000;
      padding: 4px 10px;
      font-weight: 800;
      border-radius: 4px;
      font-size: 0.8rem;
      text-transform: uppercase;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
      z-index: 2;
    }
    .cal-info {
      padding: 15px;
    }
    .cal-series-title {
      font-size: 1.2rem;
      font-weight: 800;
      margin-bottom: 5px;
      color: var(--primary-accent);
    }
    .cal-ep-title {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 5px;
    }
    .cal-ep-meta {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 10px;
    }
    .cal-overview {
      font-size: 0.85rem;
      color: #aaa;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    #loading-calendar {
      text-align: center;
      font-size: 1.2rem;
      color: #aaa;
      margin-top: 50px;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-left">
      <h2 class="logo" style="margin:0; font-weight:900; letter-spacing:2px; font-size:1.5rem; color:white; cursor:pointer;" onclick="window.location.href='index.html'">ARCHIVIO</h2>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="catalog_series.html">Serie</a></li>
        <li><a href="catalog_movies.html">Film</a></li>
        <li><a href="calendar.html" class="active">Calendario</a></li>
      </ul>
    </div>
    <div class="nav-right">
      <i class='bx bx-search' style="font-size: 1.5rem; cursor: pointer;"></i>
      <img src="https://i.pravatar.cc/150?img=11" alt="User" class="profile-avatar" style="width: 35px; border-radius: 50%;">
    </div>
  </nav>

  <!-- CALENDAR CONTAINER -->
  <div class="calendar-container">
    <h1 class="calendar-title">Prossime Uscite</h1>
    
    <div id="loading-calendar"><i class='bx bx-loader-alt bx-spin' style="font-size: 2rem;"></i><br>Ricerca prossimi episodi...</div>
    <div class="calendar-grid" id="calendar-grid">
      <!-- Injected via JS -->
    </div>
  </div>

  <div id="toast" class="toast">Azione completata</div>

  <script src="script.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initCalendar();
    });
  </script>
</body>
</html>
