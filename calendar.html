<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendario Uscite - Archivio Stream</title>
  <link rel="stylesheet" href="style.css?v=7">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <style>
    .calendar-container {
      padding: 100px 5% 50px 5%;
      min-height: 80vh;
      max-width: 700px;
      margin: 0 auto;
    }
    .calendar-title {
      font-size: 2rem;
      margin-bottom: 1.5rem;
      font-weight: 800;
    }
    .calendar-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .calendar-card {
      background: rgba(30, 30, 30, 0.6);
      border-radius: 14px;
      display: flex;
      align-items: center;
      padding: 14px;
      gap: 14px;
      text-decoration: none;
      color: white;
      transition: background 0.2s ease;
      border: 1px solid rgba(255,255,255,0.04);
    }
    .calendar-card:hover {
      background: rgba(50, 50, 50, 0.6);
    }
    .cal-poster {
      width: 75px;
      height: 75px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .cal-info {
      flex: 1;
      min-width: 0;
    }
    .cal-series-title {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 2px;
    }
    .cal-ep-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cal-ep-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .cal-bell {
      font-size: 1.6rem;
      color: #f5c518;
      flex-shrink: 0;
      margin-left: 8px;
    }
    #loading-calendar {
      text-align: center;
      font-size: 1.2rem;
      color: #aaa;
      margin-top: 50px;
    }
  </style>

  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Archivio">
  <link rel="apple-touch-icon" href="assets/logo.png">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-left">
      <img src="assets/logo.png" alt="Logo" class="logo" style="height: 45px; cursor:pointer;" onclick="window.location.href='index.html'">
    </div>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="catalog_series.html">Serie</a></li>
      <li><a href="catalog_movies.html">Film</a></li>
      <li><a href="calendar.html" class="active">Uscite</a></li>
    </ul>
    <div class="nav-right">
      <i class='bx bx-search' style="font-size: 1.5rem; cursor: pointer;"></i>
      <img src="https://i.pravatar.cc/150?img=11" alt="User" class="profile-avatar" style="width: 35px; border-radius: 50%;">
    </div>
  </nav>

  <!-- Mobile Tab Bar (iOS style) -->
  <div class="mobile-tab-bar">
    <a href="index.html"><img src="assets/icons/icons8-home-100.png" width="28" height="28" style="opacity: 0.6;"><span>Home</span></a>
    <a href="catalog_series.html"><img src="assets/icons/icons8-tv-100.png" width="28" height="28" style="opacity: 0.6;"><span>Serie</span></a>
    <a href="catalog_movies.html"><img src="assets/icons/icons8-movie-100.png" width="28" height="28" style="opacity: 0.6;"><span>Film</span></a>
    <a href="calendar.html"><img src="assets/icons/icons8-calendar-100.png" width="28" height="28"><span>Uscite</span></a>
  </div>

  <!-- CALENDAR CONTAINER -->
  <div class="calendar-container">
    <h1 class="calendar-title">Prossime Uscite</h1>
    
    <div id="loading-calendar"><i class='bx bx-loader-alt bx-spin' style="font-size: 2rem;"></i><br>Ricerca prossimi episodi...</div>
    <div class="calendar-list" id="calendar-grid">
      <!-- Injected via JS -->
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="script.js?v=7"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initCalendar();
    });
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js');
      });
    }
  </script>
</body>
</html>
