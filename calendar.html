<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendario Uscite - Archivio Stream</title>
  <link rel="stylesheet" href="style.css?v=6">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <style>
    .calendar-container {
      padding: 100px 5% 50px 5%;
      min-height: 80vh;
      max-width: 700px;
      margin: 0 auto;
    }
    .calendar-title {
      font-size: 2rem;
      margin-bottom: 1.5rem;
      font-weight: 800;
    }
    .calendar-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .calendar-card {
      background: rgba(30, 30, 30, 0.6);
      border-radius: 14px;
      display: flex;
      align-items: center;
      padding: 14px;
      gap: 14px;
      text-decoration: none;
      color: white;
      transition: background 0.2s ease;
      border: 1px solid rgba(255,255,255,0.04);
    }
    .calendar-card:hover {
      background: rgba(50, 50, 50, 0.6);
    }
    .cal-poster {
      width: 75px;
      height: 75px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .cal-info {
      flex: 1;
      min-width: 0;
    }
    .cal-series-title {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 2px;
    }
    .cal-ep-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .cal-ep-meta {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .cal-bell {
      font-size: 1.6rem;
      color: #f5c518;
      flex-shrink: 0;
      margin-left: 8px;
    }
    #loading-calendar {
      text-align: center;
      font-size: 1.2rem;
      color: #aaa;
      margin-top: 50px;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-left">
      <h2 class="logo" style="margin:0; font-weight:900; letter-spacing:2px; font-size:1.5rem; color:white; cursor:pointer;" onclick="window.location.href='index.html'">ARCHIVIO</h2>
    </div>
    <div class="nav-right">
      <i class='bx bx-search' style="font-size: 1.5rem; cursor: pointer;"></i>
      <img src="https://i.pravatar.cc/150?img=11" alt="User" class="profile-avatar" style="width: 35px; border-radius: 50%;">
    </div>
  </nav>

  <!-- Mobile Tab Bar (iOS style) -->
  <div class="mobile-tab-bar">
    <a href="index.html"><i class='bx bx-home'></i><span>Home</span></a>
    <a href="catalog_series.html"><i class='bx bx-tv'></i><span>Serie</span></a>
    <a href="catalog_movies.html"><i class='bx bx-film'></i><span>Film</span></a>
    <a href="calendar.html" class="active"><i class='bx bxs-calendar'></i><span>Uscite</span></a>
  </div>

  <!-- CALENDAR CONTAINER -->
  <div class="calendar-container">
    <h1 class="calendar-title">Prossime Uscite</h1>
    
    <div id="loading-calendar"><i class='bx bx-loader-alt bx-spin' style="font-size: 2rem;"></i><br>Ricerca prossimi episodi...</div>
    <div class="calendar-list" id="calendar-grid">
      <!-- Injected via JS -->
    </div>
  </div>

  <div id="toast" class="toast">Azione completata</div>

  <script src="script.js?v=6"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      initCalendar();
    });
  </script>
</body>
</html>
